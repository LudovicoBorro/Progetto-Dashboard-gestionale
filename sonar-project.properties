# must be unique in a given SonarQube Server instance
sonar.projectKey=Dashboard-gestionale-ottimizzazioni-ufficio-isp

# --- optional properties ---

# defaults to project key
sonar.projectName=Dashboard gestionale
# defaults to 'not provided'
#sonar.projectVersion=1.0
 
# Path is relative to the sonar-project.properties file. Defaults to .
# Dovrò aggiungere anche UI, data, reports ... e tutti i moduli che vorrò testare
sonar.sources=core,solver,utils
 
# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Parametri per i test
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml

# Configurazioni di rete
sonar.host.url=http://localhost:9000
sonar.token=$env:SONAR_TOKEN